<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adaptive I Love You Heart</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none; /* Запрещаем случайный скролл на телефонах */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let scale = 16;
        let fontSize = 14;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Находим меньшую сторону экрана (ширину или высоту)
            const minSide = Math.min(canvas.width, canvas.height);
            
            // Динамический масштаб: чем меньше экран, тем меньше сердце, 
            // цифра 45 дает комфортные отступы от краев.
            scale = minSide / 45;
            
            // Динамический размер шрифта (не меньше 10px для читаемости)
            fontSize = Math.max(10, minSide / 40);
        }
        
        // Пересчитываем размеры при загрузке и при повороте/изменении экрана
        window.addEventListener('resize', resize);
        resize();

        let timeOffset = 0; 

        function draw() {
            ctx.fillStyle = '#000'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            
            // Статичный наклон
            ctx.rotate(-0.3); 

            // Применяем вычисленный адаптивный шрифт
            ctx.font = `bold ${fontSize}px monospace`;
            ctx.fillStyle = '#ffb6c1';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Рисуем плотный контур
            for (let i = 0; i < Math.PI * 2; i += 0.08) {
                let t = i + timeOffset; 
                
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                
                // Используем вычисленный адаптивный масштаб
                ctx.fillText('I love you', x * scale, y * scale);
            }

            ctx.restore();

            // Медленное движение по часовой стрелке
            timeOffset += 0.005; 
            
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
