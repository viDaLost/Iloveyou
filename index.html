<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Heart Dense & Slow</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let timeOffset = 0; 

        function draw() {
            // Полностью закрашиваем фон для четкости (без размытия)
            ctx.fillStyle = '#000'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            
            // Наклон сердца, чтобы текст читался как на скриншоте
            ctx.rotate(-0.3); 

            ctx.font = 'bold 14px monospace';
            ctx.fillStyle = '#ffb6c1';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // ИЗМЕНЕНИЕ 1: Уменьшили шаг с 0.2 до 0.08. 
            // Теперь цикл срабатывает чаще, надписей становится больше, и они идут вплотную друг к другу.
            for (let i = 0; i < Math.PI * 2; i += 0.08) {
                let t = i + timeOffset; 
                
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                
                const scale = 16; 
                
                ctx.fillText('I love you', x * scale, y * scale);
            }

            ctx.restore();

            // ИЗМЕНЕНИЕ 2: Поменяли минус на плюс (теперь движение по часовой стрелке)
            // ИЗМЕНЕНИЕ 3: Уменьшили число с 0.015 до 0.005, чтобы надписи "ползли" медленнее.
            timeOffset += 0.005; 
            
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
